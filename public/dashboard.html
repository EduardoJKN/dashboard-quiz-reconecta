<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Dashboard · Diagnóstico Reconecta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/pt.js"></script>
  <style>
    :root {
      --vinho: #5c1a1a; --vinho2: #431210; --dourado: #ead2a0; --ouro: #b8860b;
      --creme: #faf5ec; --texto: #3a2a26; --cinza: #8a7a72;
      --verde: #2e7d52; --vermelho: #b54a45;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, 'Times New Roman', serif; background: var(--creme); color: var(--texto); padding: 28px 18px 60px; }
    .wrap { max-width: 1040px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 22px; }
    header h1 { color: var(--vinho); font-size: 26px; }
    header p { color: var(--cinza); font-size: 13px; margin-top: 4px; }
    .barra-topo { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .btn { background: var(--vinho); color: var(--dourado); border: none; border-radius: 8px; padding: 9px 16px; font-family: inherit; font-size: 13px; cursor: pointer; }
    .btn:hover { background: var(--vinho2); }
    .atualizado { font-size: 12px; color: var(--cinza); }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 26px; }
    .card { background: #fff; border: 1px solid #ecddc4; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 1px 3px rgba(92,26,26,.05); }
    .card .num { font-size: 26px; color: var(--vinho); font-weight: bold; }
    .card .lbl { font-size: 12px; color: var(--cinza); margin-top: 4px; line-height: 1.3; }
    .card.destaque { background: var(--vinho); }
    .card.destaque .num, .card.destaque .lbl { color: var(--dourado); }
    .card.ouro { background: linear-gradient(135deg, #7a5a10, var(--ouro)); }
    .card.ouro .num, .card.ouro .lbl { color: #fff; }
    .card .pct { font-size: 12px; font-weight: bold; color: var(--verde); margin-top: 2px; }
    .card.destaque .pct { color: var(--dourado); }
    .card.ouro .pct { color: #fff; }

    section { background: #fff; border: 1px solid #ecddc4; border-radius: 12px; padding: 20px 22px; margin-bottom: 22px; }
    section h2 { color: var(--vinho); font-size: 18px; margin-bottom: 4px; }
    section .desc { font-size: 12px; color: var(--cinza); margin-bottom: 16px; }
    code { background: #f3ead9; padding: 1px 5px; border-radius: 4px; font-size: 12px; }

    /* Barras horizontais (perguntas, perfis, abandono) */
    .linha { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .linha .nome { width: 190px; font-size: 13px; flex-shrink: 0; }
    .linha .trilho { flex: 1; background: #f0e7d6; border-radius: 6px; height: 24px; position: relative; overflow: hidden; }
    .linha .preench { height: 100%; background: linear-gradient(90deg, var(--vinho), #7a2a2a); border-radius: 6px; min-width: 2px; transition: width .4s; }
    .linha .val { width: 150px; font-size: 12px; text-align: right; flex-shrink: 0; color: var(--cinza); }
    .linha .val b { color: var(--texto); }
    .drop { color: var(--vermelho); }
    .perfil .preench { background: linear-gradient(90deg, var(--ouro), var(--dourado)); }
    .perfil .nome { width: 230px; }

    /* Desenho do funil (afunilando) */
    .funil-desenho { padding: 6px 0; }
    .fd-row { display: grid; grid-template-columns: 175px 1fr 160px; align-items: center; gap: 10px; margin-bottom: 7px; }
    .fd-label { font-size: 13px; }
    .fd-track { display: flex; justify-content: center; }
    .fd-bar { height: 30px; border-radius: 7px; background: linear-gradient(90deg, #7a2a2a, var(--vinho)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: bold; min-width: 34px; box-shadow: 0 1px 4px rgba(92,26,26,.15); }
    .fd-bar.ouro { background: linear-gradient(90deg, var(--ouro), #d4a52a); color: var(--vinho2); }
    .fd-val { font-size: 12px; text-align: right; color: var(--cinza); }
    .fd-val b { color: var(--texto); font-size: 13px; }
    .fd-sep { text-align: center; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--ouro); margin: 12px 0 8px; }

    /* Breakdown discreto A/B/C por pergunta (P1..P15) */
    .ab-breakdown { font-size: 11px; color: #8a7668; margin-top: 2px; line-height: 1.3; }
    .linha .ab-inline { display: block; font-size: 11px; color: #8a7668; margin-top: 2px; font-weight: normal; }
    .linha .ab-inline b.sel { color: var(--vinho); }

    /* Card A/B/C: taxas + destaque quando o filtro seleciona a entrada */
    .card .ab-taxas { font-size: 11px; color: var(--cinza); margin-top: 6px; line-height: 1.4; }
    .card .ab-taxas b { color: var(--texto); }
    .card.ab-selecionada { outline: 2px solid var(--vinho); box-shadow: 0 2px 8px rgba(92,26,26,.18); }

    /* Aviso discreto no bloco de investimento */
    .invest-obs { font-size: 12px; color: var(--cinza); margin-top: 6px; font-style: italic; }

    .periodo-linha select.periodo-input {
      padding: 6px 9px; border: 1px solid #d8c6a8; border-radius: 8px;
      font-family: inherit; font-size: 13px; background: #fff; width: 120px;
    }

    .vazio { text-align: center; color: var(--cinza); padding: 30px; font-size: 14px; }
    .login { max-width: 360px; margin: 60px auto; text-align: center; }
    .login input { width: 100%; padding: 11px; border: 1px solid #d8c6a8; border-radius: 8px; font-family: inherit; margin: 12px 0; font-size: 14px; }
    .aviso { background: #fff7e8; border: 1px solid #f0d9a8; color: #8a6d2a; font-size: 12px; border-radius: 8px; padding: 10px 14px; margin-bottom: 22px; }
    .invest-linha { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; font-size: 13px; }
    .invest-linha input { padding: 7px 10px; border: 1px solid #d8c6a8; border-radius: 8px; font-family: inherit; font-size: 13px; width: 140px; }
    .invest-linha .cpl { color: var(--vinho); font-size: 14px; font-weight: bold; }
    .invest-fonte { font-size: 12px; color: var(--verde); font-weight: bold; }
    .invest-pill { display: inline-block; padding: 7px 12px; background: #f5efe3; border: 1px solid #d8c6a8; border-radius: 8px; font-weight: bold; color: var(--vinho); font-size: 14px; }
    .periodo-linha { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 8px 0 16px; font-size: 13px; color: #6b5e57; }
    .periodo-linha input.periodo-input,
    .periodo-linha input[type="date"] { padding: 6px 9px; border: 1px solid #d8c6a8; border-radius: 8px; font-family: inherit; font-size: 13px; background: #fff; width: 120px; }
    .cpl-linha { font-size: 12px; font-weight: bold; color: var(--vinho); margin-top: 5px; padding-top: 5px; border-top: 1px solid #efe3cf; }
    .card.ouro .cpl-linha { color: #fff; border-top-color: rgba(255,255,255,.3); }
    .card.destaque .cpl-linha { color: var(--dourado); border-top-color: rgba(234,210,160,.3); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    @media (max-width: 720px) { .grid2 { grid-template-columns: 1fr; } .fd-row { grid-template-columns: 120px 1fr 96px; } .linha .nome { width: 130px; } .linha .val { width: 110px; } }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="vazio">Carregando…</div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    let token = params.get('token') || '';
    let ultimaMetrica = null;
    let investimento = Number(localStorage.getItem('reconecta_invest') || 0);
    let investAuto = false;   // true = veio do Meta Ads
    let investPeriodo = '';

    function fmtData(ts) { return new Date(ts).toLocaleString('pt-BR'); }
    function fmtBRL(n) { return (Number(n) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

    // --- Periodo (filtro geral) ---
    function _pad(n) { return String(n).padStart(2, '0'); }
    function _ymd(d) { return `${d.getFullYear()}-${_pad(d.getMonth()+1)}-${_pad(d.getDate())}`; }
    function _isYmd(s) { return /^\d{4}-\d{2}-\d{2}$/.test(String(s||'')); }
    function periodoDefault() {
      const now = new Date();
      return { inicio: _ymd(new Date(now.getFullYear(), now.getMonth(), 1)), fim: _ymd(now) };
    }
    const _defP = periodoDefault();
    let periodoInicio = _isYmd(params.get('inicio')) ? params.get('inicio')
      : (_isYmd(localStorage.getItem('reconecta_inicio')) ? localStorage.getItem('reconecta_inicio') : _defP.inicio);
    let periodoFim = _isYmd(params.get('fim')) ? params.get('fim')
      : (_isYmd(localStorage.getItem('reconecta_fim')) ? localStorage.getItem('reconecta_fim') : _defP.fim);

    // --- Filtro Entrada A/B/C (afeta todo o dashboard onde faz sentido) ---
    function _normEntrada(v) {
      const s = String(v == null ? '' : v).toLowerCase().trim();
      return (s === 'a' || s === 'b' || s === 'c') ? s : 'todas';
    }
    let entradaAtual = _normEntrada(
      params.get('entrada') || localStorage.getItem('reconecta_entrada') || 'todas'
    );
    function periodoQuery() {
      const base = `&inicio=${encodeURIComponent(periodoInicio)}&fim=${encodeURIComponent(periodoFim)}`;
      return entradaAtual === 'todas' ? base : base + `&entrada=${encodeURIComponent(entradaAtual)}`;
    }
    // flatpickr: cria (ou reaproveita) instancias em pt-BR. Formato visual
    // dd/mm/aaaa via altInput; valor real permanece YYYY-MM-DD.
    let _fpInicio = null, _fpFim = null;
    function sincronizarPeriodoInputs() {
      const i = document.getElementById('periodo-inicio');
      const f = document.getElementById('periodo-fim');
      if (!i || !f || typeof flatpickr === 'undefined') {
        if (i) i.value = periodoInicio;
        if (f) f.value = periodoFim;
        return;
      }
      const cfg = {
        dateFormat: 'Y-m-d',
        altInput: true,
        altFormat: 'd/m/Y',
        allowInput: true,
        locale: (flatpickr.l10ns && flatpickr.l10ns.pt) || undefined,
      };
      if (_fpInicio) _fpInicio.destroy();
      if (_fpFim) _fpFim.destroy();
      _fpInicio = flatpickr(i, cfg);
      _fpFim = flatpickr(f, cfg);
      _fpInicio.setDate(periodoInicio, false);
      _fpFim.setDate(periodoFim, false);
    }
    function aplicarPeriodo() {
      const i = _fpInicio ? _fpInicio.input.value : document.getElementById('periodo-inicio').value;
      const f = _fpFim ? _fpFim.input.value : document.getElementById('periodo-fim').value;
      if (!_isYmd(i) || !_isYmd(f)) return;
      periodoInicio = i; periodoFim = f;
      localStorage.setItem('reconecta_inicio', i);
      localStorage.setItem('reconecta_fim', f);
      const selEntrada = document.getElementById('entrada-select');
      if (selEntrada) entradaAtual = _normEntrada(selEntrada.value);
      localStorage.setItem('reconecta_entrada', entradaAtual);
      const url = new URL(location.href);
      url.searchParams.set('inicio', i);
      url.searchParams.set('fim', f);
      if (entradaAtual === 'todas') url.searchParams.delete('entrada');
      else url.searchParams.set('entrada', entradaAtual);
      history.replaceState(null, '', url.toString());
      carregar();
    }

    function telaLogin(msg) {
      document.getElementById('app').innerHTML = `
        <div class="login">
          <h1 style="color:#5c1a1a">Dashboard Reconecta</h1>
          <p style="color:#8a7a72;font-size:13px;margin-top:6px">${msg || 'Informe o token de acesso.'}</p>
          <input id="tk" type="password" placeholder="token de acesso" />
          <button class="btn" onclick="entrar()">Entrar</button>
        </div>`;
    }
    function entrar() {
      const v = document.getElementById('tk').value.trim();
      if (!v) return;
      location.search = '?token=' + encodeURIComponent(v);
    }

    function barra(nome, preenchPct, valHtml, extraClass) {
      return `
        <div class="linha ${extraClass || ''}">
          <div class="nome">${nome}</div>
          <div class="trilho"><div class="preench" style="width:${Math.max(0, Math.min(100, preenchPct))}%"></div></div>
          <div class="val">${valHtml}</div>
        </div>`;
    }

    function stage(m, key) {
      const f = (m.funil || []).find((x) => x.key === key);
      return f || { sessoes: 0, pct_topo: 0, abandonaram: 0, label: key };
    }

    function fdRow(label, count, pct, drop, ouro) {
      const w = Math.max(3, Math.min(100, pct));
      const dropHtml = drop > 0 ? ` <span class="drop">−${drop}</span>` : '';
      return `
        <div class="fd-row">
          <div class="fd-label">${label}</div>
          <div class="fd-track"><div class="fd-bar ${ouro ? 'ouro' : ''}" style="width:${w}%">${count}</div></div>
          <div class="fd-val"><b>${count}</b> · ${pct}%${dropHtml}</div>
        </div>`;
    }

    // Card com número + percentual (passe pct=null pra esconder o %)
    function card(num, lbl, pct, cls) {
      const p = (pct === null || pct === undefined) ? '' : `<div class="pct">${pct}%</div>`;
      return `<div class="card ${cls || ''}"><div class="num">${num}</div>${p}<div class="lbl">${lbl}</div></div>`;
    }

    // Leads por tipo + CPL (calculado com o investimento digitado)
    function renderLeads() {
      const m = ultimaMetrica;
      if (!m) return;
      const lt = m.leads_tipos || { total: 0, tipos: [] };
      const leads = (m.totais && m.totais.leads) || 0;
      const inv = Number(investimento) || 0;
      const elCpl = document.getElementById('cpl-geral');
      if (elCpl) {
        elCpl.innerHTML = inv
          ? `CPL geral: <span class="cpl">R$ ${fmtBRL(leads ? inv / leads : 0)}</span> · ${leads} leads`
          : `${leads} leads no total`;
      }
      const elFonte = document.getElementById('invest-fonte');
      if (elFonte) {
        elFonte.innerHTML = investAuto
          ? `🔗 puxado do Meta${investPeriodo ? ' (' + investPeriodo + ')' : ''}`
          : '';
      }
      const elVal = document.getElementById('invest-display');
      if (elVal) elVal.textContent = 'R$ ' + fmtBRL(inv);
      const cont = document.getElementById('leads-tabela');
      if (!cont) return;
      const corTipo = { 'Acima de R$12k/mês': 'ouro', 'Abaixo de R$12k/mês': '', 'Não atua na área': '' };
      const leadCard = (num, lbl, pctv, cplv, cls) => `
        <div class="card ${cls || ''}">
          <div class="num">${num}</div>
          ${pctv === null ? '' : `<div class="pct">${pctv}%</div>`}
          <div class="lbl">${lbl}</div>
          ${cplv === null || cplv === undefined ? '' : `<div class="cpl-linha">CPL R$ ${fmtBRL(cplv)}</div>`}
        </div>`;
      let html = leadCard(leads, 'Total de leads', null, null, 'destaque');
      if (lt.tipos && lt.tipos.length) {
        html += lt.tipos.map((x) => leadCard(
          x.count, x.tipo, x.pct, inv ? (x.count ? inv / x.count : 0) : null, corTipo[x.tipo]
        )).join('');
      }
      cont.innerHTML = `<div class="cards" style="margin-bottom:0">${html}</div>`;
    }

    function render(m) {
      ultimaMetrica = m;
      const t = m.totais;
      const c = m.conversao;
      const pg = m.pagamento || {};
      const semDados = m.total_sessoes === 0;
      const base = stage(m, 'visita').sessoes || 1;
      const pctB = (n) => (base ? Math.round((n / base) * 1000) / 10 : 0);

      // ---- Cards de números-chave (número + %) ----
      const bV = t.visitas || 1;
      const pctV = (n) => Math.round((n / bV) * 1000) / 10;
      const esperando = pg.esperando_pagamento || 0;
      const pctEsperando = t.compras ? Math.round((esperando / t.compras) * 1000) / 10 : 0;
      const cards = `
        <div class="cards">
          ${card(t.visitas, 'Abriram o quiz', 100)}
          ${card(t.iniciaram, 'Começaram', pctV(t.iniciaram))}
          ${card(t.leads, 'Leads (formulário)', pctV(t.leads))}
          ${card(t.resultados, 'Viram o diagnóstico', pctV(t.resultados))}
          ${card(t.compras, 'Clicaram comprar', pctV(t.compras))}
          ${card(esperando, 'Esperando pagamento', pctEsperando)}
          ${card(pg.pagos_total || 0, 'Pagos (Pix + cartão)', pctV(pg.pagos_total || 0), 'ouro')}
          ${card(c.geral + '%', 'Conversão geral<br>(abriu → PDF)', null, 'destaque')}
        </div>`;

      // ---- Cards A/B/C (teste de entrada) — so quem tem email valido ----
      // Sempre comparativos do periodo INTEIRO (independente do filtro).
      // Cada card mostra contagem, %, e as taxas: inicio, termino, conversao.
      const ab = m.ab_entradas || { a: 0, b: 0, c: 0 };
      const abm = m.ab_metricas || { a: {}, b: {}, c: {} };
      const abTotal = (ab.a || 0) + (ab.b || 0) + (ab.c || 0);
      const pctAB = (n) => (abTotal ? Math.round((n / abTotal) * 1000) / 10 : 0);
      const filtroEntrada = (m.filtro && m.filtro.entrada) || 'todas';
      const cardAB = (letra) => {
        const met = abm[letra] || {};
        const sel = filtroEntrada === letra ? 'ab-selecionada' : '';
        const taxas = `
          <div class="ab-taxas">
            Início <b>${met.taxa_inicio || 0}%</b> · Término <b>${met.taxa_termino || 0}%</b><br>
            Conv. <b>${met.taxa_conversao || 0}%</b>
          </div>`;
        return `
          <div class="card ${sel}">
            <div class="num">${ab[letra] || 0}</div>
            <div class="pct">${pctAB(ab[letra] || 0)}%</div>
            <div class="lbl">Entrada ${letra.toUpperCase()}</div>
            ${taxas}
          </div>`;
      };
      const cardsAB = `
        <div class="cards">
          ${cardAB('a')}
          ${cardAB('b')}
          ${cardAB('c')}
        </div>`;

      // ---- Desenho do funil (sessões) + pagamento ----
      const ordem = ['visita', 'iniciou', 'captura', 'lead', 'resultado', 'compra', 'esperando_pagamento', 'pdf'];
      let desenho = ordem.map((k) => {
        const s = stage(m, k);
        return fdRow(s.label, s.sessoes, s.pct_topo, s.abandonaram, false);
      }).join('');
      desenho += `<div class="fd-sep">— checkout · Guru —</div>`;
      desenho += fdRow('Pagou no Pix', pg.pix || 0, pctB(pg.pix || 0), 0, true);
      desenho += fdRow('Pagou no cartão', pg.cartao || 0, pctB(pg.cartao || 0), 0, true);
      if (pg.boleto) desenho += fdRow('Pagou no boleto', pg.boleto, pctB(pg.boleto), 0, true);

      // ---- Bloco de pagamento (número + % sobre o total pago) ----
      const pt = pg.pagos_total || 0;
      const pctP = (n) => (pt ? Math.round((n / pt) * 1000) / 10 : 0);
      const pagCards = `
        <div class="cards" style="margin-bottom:0">
          ${card(pg.pix || 0, 'Pagos no Pix', pctP(pg.pix || 0))}
          ${card(pg.cartao || 0, 'Pagos no cartão', pctP(pg.cartao || 0))}
          ${card(pg.pagos_total || 0, 'Total pago', null)}
          ${card(pg.reembolsos || 0, 'Reembolsos', pg.taxa_reembolso || 0)}
          ${card((pg.taxa_reembolso || 0) + '%', 'Taxa de reembolso', null)}
          ${card('R$ ' + fmtBRL(pg.faturamento_liquido || 0), 'Faturamento líquido', null, 'ouro')}
          ${card('R$ ' + fmtBRL(pg.ticket || 0), 'Ticket médio', null)}
        </div>`;

      // ---- Captação por link / origem ----
      const cap = m.captacao || { tem_origem: false, fontes: [] };
      const capAviso = cap.tem_origem
        ? ''
        : `<div class="aviso">⏳ As origens ainda não estão chegando. Quando o time incluir a origem/UTM do link no evento de visita (ex.: <code>utm_source=instagram-bio</code>), cada link aparece aqui com número, % e conversão.</div>`;
      const capHtml = cap.fontes.length
        ? cap.fontes.map((f) => barra(
            f.origem, f.pct,
            `<b>${f.visitas}</b> · ${f.pct}% · ${f.leads} leads (${f.conv_lead}%) · ${f.compras} compras`
          )).join('')
        : '<div class="vazio">Sem visitas registradas ainda.</div>';

      // ---- Captação de leads (qualidade + custo) ----
      const lt = m.leads_tipos || { classificado: false };
      const leadsAviso = lt.classificado
        ? ''
        : `<div class="aviso">⏳ Os tipos de lead ainda não estão chegando. Quando o time enviar o <code>faturamento</code> do formulário no evento de lead, aparecem aqui: acima de 12k, abaixo de 12k e não atua, com % e CPL.</div>`;
      const pagAviso = pg.conectado
        ? ''
        : `<div class="aviso">⏳ Nenhum pagamento recebido ainda. Assim que o time apontar o webhook do Guru pra <code>/api/webhook/pagamento</code>, Pix, cartão e reembolso aparecem aqui sozinhos.</div>`;

      // ---- Funil por pergunta (P1..P15) ----
      // Mantem o breakdown A/B/C sempre; se um filtro estiver ativo, destaca
      // a entrada selecionada em negrito (o valor total do funil ja veio
      // filtrado do backend).
      const perguntas = (m.funil || []).filter((f) => /^p\d+$/.test(f.key));
      const selKey = (filtroEntrada === 'a' || filtroEntrada === 'b' || filtroEntrada === 'c') ? filtroEntrada : null;
      const abParte = (v, k) => selKey === k ? `<b class="sel">${k.toUpperCase()}: ${v}</b>` : `${k.toUpperCase()}: ${v}`;
      const perguntasHtml = perguntas.length
        ? perguntas.map((f) => {
            const abF = f.ab || { a: 0, b: 0, c: 0 };
            const temAB = (abF.a || abF.b || abF.c);
            const abHtml = temAB
              ? `<span class="ab-inline">${abParte(abF.a || 0, 'a')} · ${abParte(abF.b || 0, 'b')} · ${abParte(abF.c || 0, 'c')}</span>`
              : '';
            const nomeHtml = `${f.label}${abHtml}`;
            return barra(
              nomeHtml, f.pct_topo,
              `<b>${f.sessoes}</b> · ${f.pct_topo}%${f.abandonaram > 0 ? ` <span class="drop">−${f.abandonaram}</span>` : ''}`
            );
          }).join('')
        : '<div class="vazio">Ninguém respondeu perguntas ainda.</div>';

      // ---- Conversão ----
      const conv = `
        <div class="cards" style="margin-bottom:0">
          <div class="card"><div class="num">${c.visita_resultado}%</div><div class="lbl">Abriu → Diagnóstico</div></div>
          <div class="card"><div class="num">${c.resultado_compra}%</div><div class="lbl">Diagnóstico → Comprar</div></div>
          <div class="card"><div class="num">${c.compra_pago}%</div><div class="lbl">Comprar → Pago</div></div>
          <div class="card"><div class="num">${c.compra_pdf}%</div><div class="lbl">Comprar → PDF</div></div>
        </div>`;

      // ---- Perfis + onde pararam ----
      const perfilHtml = m.perfis.length
        ? m.perfis.map((p) => barra(`${p.emoji} ${p.nome}`, p.pct, `<b>${p.count}</b> · ${p.pct}%`, 'perfil')).join('')
        : '<div class="vazio">Ninguém chegou ao diagnóstico ainda.</div>';
      const abandonoHtml = m.abandono.length
        ? m.abandono.map((a) => barra(a.label, m.total_sessoes ? (a.count / m.total_sessoes) * 100 : 0, `<b>${a.count}</b> sessões`)).join('')
        : '<div class="vazio">Sem abandonos registrados.</div>';

      document.getElementById('app').innerHTML = `
        <header>
          <h1>📊 Dashboard · Diagnóstico Reconecta</h1>
          <p>Funil completo do quiz + pagamento (Guru) · serviço paralelo</p>
        </header>
        <div class="barra-topo">
          <span class="atualizado">Atualizado em ${fmtData(m.gerado_em)} · ${m.total_sessoes} sessões no total</span>
        </div>
        <div class="periodo-linha">
          <span>Período:</span>
          <input type="text" id="periodo-inicio" class="periodo-input" />
          <span>até</span>
          <input type="text" id="periodo-fim" class="periodo-input" />
          <span style="margin-left:10px">Entrada:</span>
          <select id="entrada-select" class="periodo-input">
            <option value="todas">Todas</option>
            <option value="a">Entrada A</option>
            <option value="b">Entrada B</option>
            <option value="c">Entrada C</option>
          </select>
          <button class="btn" onclick="aplicarPeriodo()">Aplicar</button>
        </div>
        ${cards}
        ${cardsAB}
        ${semDados ? '<section><div class="vazio">Ainda não há dados. Assim que o funil começar a mandar eventos pra cá, o funil aparece aqui. 🙂</div></section>' : ''}
        <section>
          <h2>💰 Investimento × leads (custo por lead)</h2>
          <p class="desc">Quantos leads entraram e de que tipo (pelo faturamento do formulário). Digite o investimento em anúncios pra ver o CPL geral e por tipo.</p>
          ${leadsAviso}
          <div class="invest-linha">
            <span>Investimento em anúncios:</span>
            <span id="invest-display" class="invest-pill">R$ 0,00</span>
            <span id="invest-fonte" class="invest-fonte"></span>
            <span id="cpl-geral"></span>
          </div>
          ${filtroEntrada !== 'todas' ? '<div class="invest-obs">Investimento geral da campanha (não filtrado por entrada A/B/C).</div>' : ''}
          <div id="leads-tabela"></div>
        </section>
        <section>
          <h2>🔗 Origem dos leads (por link)</h2>
          <p class="desc">De onde cada sessão veio (primeiro toque): número, % do total e quanto virou lead/compra.</p>
          ${capAviso}
          ${capHtml}
        </section>
        <section>
          <h2>📉 Desenho do funil</h2>
          <p class="desc">Do topo (abriu) até o pagamento. A barra afunila conforme perde gente; o <span class="drop">−N</span> mostra quantas você perdeu naquela etapa.</p>
          <div class="funil-desenho">${desenho}</div>
        </section>
        <section>
          <h2>💳 Pagamento (checkout Guru)</h2>
          <p class="desc">Pix, cartão, reembolso, faturamento e ticket. Chegam pelo webhook do Guru.</p>
          ${pagAviso}
          ${pagCards}
        </section>
        <section>
          <h2>Funil por pergunta (P1 → P15)</h2>
          <p class="desc">Quantas sessões alcançaram cada pergunta (% sobre quem abriu). Enxerga em qual pergunta o quiz mais perde gente.</p>
          ${perguntasHtml}
        </section>
        <section>
          <h2>Taxas de conversão</h2>
          <p class="desc">As passagens mais importantes do funil.</p>
          ${conv}
        </section>
        <div class="grid2">
          <section>
            <h2>Distribuição por perfil</h2>
            <p class="desc">Entre quem chegou ao diagnóstico, qual perfil cada uma recebeu.</p>
            ${perfilHtml}
          </section>
          <section>
            <h2>Onde as pessoas pararam</h2>
            <p class="desc">A última etapa que cada sessão que NÃO converteu alcançou.</p>
            ${abandonoHtml}
          </section>
        </div>`;

      renderLeads();
      sincronizarPeriodoInputs();
      const selEntrada = document.getElementById('entrada-select');
      if (selEntrada) selEntrada.value = entradaAtual;
    }

    async function puxarInvestimentoMeta() {
      try {
        const r = await fetch('/api/investimento?token=' + encodeURIComponent(token) + periodoQuery());
        if (!r.ok) return;
        const j = await r.json();
        if (j && j.fonte === 'meta' && j.investimento != null) {
          investimento = j.investimento;
          investAuto = true;
          investPeriodo = '';
          localStorage.setItem('reconecta_invest', investimento);
        }
      } catch (e) { /* sem Meta: segue no valor manual */ }
    }

    async function carregar() {
      if (!token) return telaLogin();
      try {
        const [r] = await Promise.all([
          fetch('/api/stats?token=' + encodeURIComponent(token) + periodoQuery()),
          puxarInvestimentoMeta(),
        ]);
        if (r.status === 401) return telaLogin('Token inválido. Tente de novo.');
        if (!r.ok) throw new Error('falha');
        render(await r.json());
      } catch (e) {
        document.getElementById('app').innerHTML = '<div class="vazio">Erro ao carregar as métricas. Tente atualizar.</div>';
      }
    }

    carregar();
  </script>
</body>
</html>
